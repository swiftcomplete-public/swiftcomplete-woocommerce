# Version and release Swiftcomplete plugin from git tags (e.g. v2.0.1).
# Usage: bump version in plugin files, commit, push, then create tag:
#   git tag v2.0.1 && git push origin v2.0.1
name: Release Swiftcomplete

on:
  push:
    tags:
      # Supports both v-prefixed and plain tags:
      # v2.0.0, v2.0.0-alpha.0, 2.0.0, 2.0.0-alpha.0
      - 'v[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*-*'
      - '[0-9]*.[0-9]*.[0-9]*'
      - '[0-9]*.[0-9]*.[0-9]*-*'
  release:
    types: [published]
jobs:
  set-version:
    name: Set version from tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
          fetch-depth: 0
      - name: Set version from tag
        id: version
        run: |
          # GITHUB_REF_NAME is the tag name (e.g. v2.0.0 or 2.0.0)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Tag: $GITHUB_REF_NAME -> Version: $VERSION"
      - name: Update version in plugin and readme
        run: |
          VERSION="${{ env.VERSION }}"
          PLUGIN="swiftcomplete/swiftcomplete.php"
          README="swiftcomplete/README.txt"
          sed -i "s/^\s*\* Version:.*/\* Version: $VERSION/" "$PLUGIN"
          sed -i "s/define('SWIFTCOMPLETE_VERSION', '[^']*');/define('SWIFTCOMPLETE_VERSION', '$VERSION');/" "$PLUGIN"
          sed -i "s/^Stable tag: .*/Stable tag: $VERSION/" "$README"
          echo "Updated $PLUGIN and $README to $VERSION"
      - name: Verify version
        run: |
          grep -E "Version: ${{ env.VERSION }}" swiftcomplete/swiftcomplete.php
          grep -E "SWIFTCOMPLETE_VERSION', '${{ env.VERSION }}'" swiftcomplete/swiftcomplete.php
          grep -E "Stable tag: ${{ env.VERSION }}" swiftcomplete/README.txt
      # RELEASE_PUSH_VERSION_UPDATE=true: commit version bump and push to branch where tag was created (or default)
      - name: Resolve branch to push to (current branch when tag was created, or default)
        id: branch
        if: vars.RELEASE_PUSH_VERSION_UPDATE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/branches-where-head" \
            | jq -r '.[0].name // empty')
          echo "branch=${BRANCH:-${{ github.event.repository.default_branch }}}" >> $GITHUB_OUTPUT
          echo "Will push to: ${BRANCH:-${{ github.event.repository.default_branch }}}"
      - name: Commit and push version update
        if: vars.RELEASE_PUSH_VERSION_UPDATE == 'true'
        env:
          TARGET_BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add swiftcomplete/swiftcomplete.php swiftcomplete/README.txt
          git diff --staged --quiet && echo "No version changes to commit" || {
            git commit -m "chore: set version to ${{ env.VERSION }} [skip ci]"
            git push origin HEAD:"${TARGET_BRANCH}"
          }
    outputs:
      version: ${{ steps.version.outputs.version }}

  # Add further jobs here (e.g. publish to WordPress.org SVN, create GitHub Release)
  # and use: needs: set-version, env: VERSION: ${{ needs.set-version.outputs.version }}
